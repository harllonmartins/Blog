<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - My Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: #fff;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    
    h1 {
      font-size: 2em;
      margin-bottom: 5px;
      font-weight: 700;
    }
    
    h1 a {
      text-decoration: none;
      color: inherit;
    }
    
    h1 a:hover {
      text-decoration: underline;
    }
    
    .search-box {
      margin: 30px 0;
    }
    
    input[type="search"] {
      width: 100%;
      padding: 12px;
      font-size: 1em;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: inherit;
    }
    
    input[type="search"]:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
    }
    
    .results {
      margin-top: 30px;
    }
    
    .no-results {
      color: #999;
      text-align: center;
      padding: 40px 0;
    }
    
    .result-item {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    
    .result-item:last-child {
      border-bottom: none;
    }
    
    .result-item h3 {
      margin-bottom: 8px;
    }
    
    .result-item h3 a {
      text-decoration: none;
      color: #0066cc;
    }
    
    .result-item h3 a:hover {
      text-decoration: underline;
    }
    
    .result-meta {
      color: #999;
      font-size: 0.9em;
      margin-bottom: 8px;
    }
    
    .result-excerpt {
      color: #666;
      line-height: 1.5;
    }
    
    .tags {
      margin-top: 10px;
      font-size: 0.85em;
    }
    
    .tag {
      display: inline-block;
      background: #f5f5f5;
      padding: 3px 8px;
      border-radius: 3px;
      margin-right: 5px;
      color: #666;
    }
    
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      text-align: center;
      color: #999;
      font-size: 0.9em;
    }
    
    footer a {
      color: #999;
      text-decoration: none;
    }
    
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">My Blog</a></h1>
    <p style="color: #666;">Search my posts</p>
  </header>
  
  <div class="search-box">
    <input
      type="search"
      id="search-input"
      placeholder="Search posts..."
      autocomplete="off"
    />
  </div>
  
  <div class="results" id="results"></div>
  
  <footer>
    <p><a href="/">← Back to home</a> | <a href="/feed.xml">RSS Feed</a></p>
  </footer>

  <script>
    let searchIndex = [];

    // Load search index
    fetch('/search-index.json')
      .then(response => response.json())
      .then(data => {
        searchIndex = data;
        // Auto-search if there's a query parameter
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        if (query) {
          document.getElementById('search-input').value = query;
          performSearch(query);
        }
      });

    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('results');

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value;
      if (query.length > 0) {
        performSearch(query);
      } else {
        resultsContainer.innerHTML = '';
      }
    });

    function performSearch(query) {
      const lowerQuery = query.toLowerCase();
      const results = searchIndex.filter(post => {
        const titleMatch = post.title.toLowerCase().includes(lowerQuery);
        const excerptMatch = post.excerpt.toLowerCase().includes(lowerQuery);
        const tagsMatch = post.tags.some(tag => tag.toLowerCase().includes(lowerQuery));
        return titleMatch || excerptMatch || tagsMatch;
      });

      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="no-results">No posts found. Try a different search term.</div>';
        return;
      }

      resultsContainer.innerHTML = results.map(post => `
        <div class="result-item">
          <h3><a href="/posts/${post.slug}.html">${escapeHtml(post.title)}</a></h3>
          <div class="result-meta">${new Date(post.date).toLocaleDateString()}</div>
          <div class="result-excerpt">${escapeHtml(post.excerpt)}</div>
          ${post.tags.length ? `<div class="tags">${post.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}</div>` : ''}
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
